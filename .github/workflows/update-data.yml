name: Päivitä aineisto

# Rakentaa esilasketun data/areas.geojson Tilastokeskuksen avoimesta datasta
# ja committoi sen, jos se muuttui. Sovellus käyttää tiedostoa ensisijaisena
# datalähteenä, joten livehaku selaimessa jää vain varapoluksi.
on:
  schedule:
    - cron: "0 3 * * 1" # maanantaisin klo 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write

# Estä rinnakkaiset ajot: kaksi yhtäaikaista ajoa kilpailee sekä PxWeb:n
# pyyntömäärärajasta että pushista mainiin.
concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  build-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Rakenna aineisto
        run: node scripts/build-data.mjs

      - name: Committoi muutokset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/areas.geojson
          if git diff --cached --quiet; then
            echo "Ei muutoksia aineistoon."
          else
            git commit -m "Päivitä aineisto Tilastokeskuksen avoimesta datasta"
            git pull --rebase origin main
            git push
          fi
